# Configuración nginx para qrbanburger.com.ar
# Copiar a: /etc/nginx/sites-available/qrbanburger
# Luego: ln -s /etc/nginx/sites-available/qrbanburger /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name qrbanburger.com.ar www.qrbanburger.com.ar;

    # Redirigir HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qrbanburger.com.ar www.qrbanburger.com.ar;

    # Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/qrbanburger.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrbanburger.com.ar/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Tamaño máximo de carga para imágenes
    client_max_body_size 10M;

    # Proxy al backend Node.js (mismo que burgerpos.gestionq24.store)
    location / {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts para WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Socket.IO específico
    location /socket.io/ {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logs
    access_log /var/log/nginx/qrbanburger_access.log;
    error_log /var/log/nginx/qrbanburger_error.log;
}
