# Configuración nginx para qrbanburger.com.ar CON SSL
# Basada en burgerpos.gestionq24.store - apunta al MISMO backend (puerto 3004)
# Copiar a: /etc/nginx/sites-available/qrbanburger DESPUÉS de obtener certificado SSL

server {
    server_name qrbanburger.com.ar www.qrbanburger.com.ar;

    # Redirigir landing page a Instagram
    location = / {
        return 302 https://instagram.com/qrbanburger;
    }

    # Panel de administración y todas las demás rutas
    location / {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /socket.io {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/qrbanburger.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrbanburger.com.ar/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.qrbanburger.com.ar) {
        return 301 https://$host$request_uri;
    }

    if ($host = qrbanburger.com.ar) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name qrbanburger.com.ar www.qrbanburger.com.ar;
    return 404;
}
