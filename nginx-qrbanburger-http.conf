# Configuración nginx TEMPORAL para qrbanburger.com.ar (solo HTTP)
# Usar mientras el DNS se propaga y no se puede obtener SSL
# Copiar a: /etc/nginx/sites-available/qrbanburger

server {
    listen 80;
    listen [::]:80;
    server_name qrbanburger.com.ar www.qrbanburger.com.ar;

    # Tamaño máximo de carga para imágenes
    client_max_body_size 10M;

    # Proxy al backend Node.js (mismo que burgerpos.gestionq24.store)
    location / {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts para WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Socket.IO específico
    location /socket.io/ {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logs
    access_log /var/log/nginx/qrbanburger_access.log;
    error_log /var/log/nginx/qrbanburger_error.log;
}
