<!DOCTYPE html>
<html>
<head>
  <title>Verificar Token BurgerPOS</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #0a0f1e;
      color: white;
    }
    .info { background: #1a2842; padding: 20px; border-radius: 12px; margin: 20px 0; }
    .label { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
    .value { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
    .superadmin { color: #a78bfa; }
    .admin { color: #f87171; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <h1>🔍 Verificación de Token</h1>
  <div class="info" id="info">Cargando...</div>
  <button onclick="borrarYRecargar()">🗑️ Borrar token y recargar</button>
  <button onclick="location.reload()">🔄 Refrescar</button>

  <script>
    function parseJwt(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) {
        return null;
      }
    }

    function verificarToken() {
      const token = localStorage.getItem('token');
      const infoDiv = document.getElementById('info');

      if (!token) {
        infoDiv.innerHTML = '<h2 style="color: #f87171;">❌ No hay token guardado</h2><p>Necesitas iniciar sesión</p>';
        return;
      }

      const decoded = parseJwt(token);

      if (!decoded) {
        infoDiv.innerHTML = '<h2 style="color: #f87171;">❌ Token inválido</h2>';
        return;
      }

      // Hacer petición al backend para obtener datos del usuario
      fetch('http://localhost:5000/api/auth/me', {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      })
      .then(res => res.json())
      .then(data => {
        if (data.success && data.usuario) {
          const u = data.usuario;
          const esSuperadmin = u.rol === 'superadmin';

          infoDiv.innerHTML = `
            <h2 style="color: ${esSuperadmin ? '#a78bfa' : '#f87171'};">
              ${esSuperadmin ? '✅ SUPERADMIN' : '⚠️ NO ES SUPERADMIN'}
            </h2>
            <div class="label">Email:</div>
            <div class="value">${u.email}</div>
            <div class="label">Nombre:</div>
            <div class="value">${u.nombre}</div>
            <div class="label">Rol:</div>
            <div class="value ${esSuperadmin ? 'superadmin' : 'admin'}">${u.rol}</div>
            <div class="label">Negocio ID:</div>
            <div class="value">${u.negocioId || 'Sin negocio (correcto para superadmin)'}</div>
            ${!esSuperadmin ? '<p style="color: #f87171; margin-top: 20px;">⚠️ Necesitas cerrar sesión e ingresar con admin@burgerpos.com</p>' : ''}
          `;
        } else {
          infoDiv.innerHTML = '<h2 style="color: #f87171;">❌ Error al obtener datos del usuario</h2><p>Token puede estar expirado</p>';
        }
      })
      .catch(err => {
        infoDiv.innerHTML = '<h2 style="color: #f87171;">❌ Error de conexión</h2><p>Asegurate que el backend esté corriendo en puerto 5000</p>';
        console.error(err);
      });
    }

    function borrarYRecargar() {
      localStorage.removeItem('token');
      alert('Token borrado. Redirigiendo al login...');
      window.location.href = 'http://localhost:3000/login';
    }

    // Ejecutar verificación al cargar
    verificarToken();
  </script>
</body>
</html>
